name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2
            - run: bun install
            - run: bun run build

            - name: Package plugin
              run: |
                  mkdir -p ${{ github.workspace }}/board-of-holding

                  # Copy main files
                  cp main.js manifest.json styles.css ${{ github.workspace }}/board-of-holding/

                  cd ${{ github.workspace }}
                  tag="${GITHUB_REF#refs/tags/}"
                  zip -r board-of-holding-$tag.zip board-of-holding/

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    board-of-holding-$tag.zip
